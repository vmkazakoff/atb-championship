<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Онлайн-чемпионат по промптингу — АТБ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #fff;
      color: #282F37;
      overflow: hidden;
    }

    .glow {
      position: fixed;
      width: 70vmax;
      height: 70vmax;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(236, 122, 36, 0.07) 0%, transparent 65%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.06); }
    }

    main {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 520px;
      padding: 2rem;
      animation: fadeUp 1s ease-out both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: block;
      width: min(200px, 55vw);
      height: auto;
      margin-bottom: 2rem;
    }

    .badge {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #EC7A24;
      margin-bottom: 1rem;
      text-align: center;
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 800;
      line-height: 1.2;
      color: #282F37;
      margin-bottom: 1rem;
      text-align: center;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.55;
      color: #3F4852;
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .loader {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .loader span {
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #EC7A24;
      animation: blink 1.4s ease-in-out infinite;
    }

    .loader span:nth-child(2) { animation-delay: 0.2s; }
    .loader span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="glow" aria-hidden="true"></div>

  <main>
    <img
      class="logo"
      src="Лого Университет с текстом снизу.png"
      alt="Университет АТБ"
    >

    <div class="badge">Онлайн-чемпионат по промптингу</div>

    <h1>Для сотрудников АТБ</h1>

    <p>
      Здесь скоро откроется веб-приложение чемпионата&nbsp;—
      командные задания, практика промптинга и&nbsp;турнирная таблица.
    </p>

    <div class="loader" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>
  </main>
</body>
</html>
