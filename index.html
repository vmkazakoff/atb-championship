<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Чемпионат по промптингу</title>
  <link id="favicon" rel="icon" href="">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      safelist: [
        'bg-gray-50', 'bg-white', 'bg-gray-200', 'bg-gray-300', 'bg-gray-500', 'bg-gray-800',
        'bg-blue-800', 'bg-green-500', 'bg-red-500', 'bg-yellow-50',
        'text-gray-50', 'text-white', 'text-gray-300', 'text-gray-500', 'text-gray-600', 'text-gray-800',
        'text-blue-800', 'text-green-500', 'text-red-500', 'text-yellow-600', 'text-yellow-800',
        'border-gray-200', 'border-gray-300', 'border-yellow-200',
        'rounded-sm', 'rounded', 'rounded-md', 'rounded-lg', 'rounded-xl', 'rounded-2xl', 'rounded-full',
        'rounded-t-sm', 'rounded-t', 'rounded-t-md', 'rounded-t-lg', 'rounded-t-xl', 'rounded-t-2xl',
        'rounded-b-sm', 'rounded-b', 'rounded-b-md', 'rounded-b-lg', 'rounded-b-xl', 'rounded-b-2xl',
        'from-blue-800', 'to-blue-800', 'hover:from-blue-800', 'hover:to-blue-800',
        'bg-[#0066CC]', 'text-[#0066CC]', 'bg-[#FF6600]', 'text-[#FF6600]',
        'group-hover:text-[var(--qr-accent)]',
        'opacity-60', 'hover:opacity-80',
        'line-clamp-2', 'line-clamp-3',
        'space-y-3',
      ],
    };
  </script>
  <style>
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin-slow { animation: spin-slow 1s linear infinite; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .pager-dot {
      width: 8px;
      height: 8px;
      border-radius: 9999px;
      background-color: #d1d5db;
      transition: background-color 0.2s, transform 0.2s;
    }
    .pager-dot.active {
      transform: scale(1.25);
    }
    @keyframes splash-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .animate-splash-float {
      animation: splash-float 2.5s ease-in-out infinite;
    }
    .assignments-viewport {
      overflow-x: hidden;
    }
    .assignment-btn {
      border: none;
      padding: 0;
      background: transparent;
      font: inherit;
      display: flex;
      flex-direction: column;
      width: 100%;
    }
    .assignment-btn--active,
    .assignment-btn--submitted {
      transition: transform 0.2s ease, opacity 0.2s ease;
      cursor: pointer;
    }
    .assignment-btn--active:hover,
    .assignment-btn--submitted:hover {
      transform: translateY(-3px);
    }
    .assignment-btn--active:active,
    .assignment-btn--submitted:active {
      transform: translateY(-1px);
    }
    .assignment-btn:focus-visible {
      outline: 2px solid #9ca3af;
      outline-offset: 2px;
    }
  </style>
</head>
<body data-theme="page-bg page-text" class="min-h-screen">

  <div id="splashScreen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-gray-50 transition-opacity duration-300">
    <img src="images/robot.png" alt="" class="w-36 sm:w-44 mb-8 animate-splash-float" width="176" height="176">
    <p class="text-sm text-gray-500">Powered by: «Мандрик, Казаков и роботы»</p>
  </div>

  <header data-theme="header-bg" class="w-full py-4 px-4 sm:px-6 shadow-md">
    <div class="flex items-center justify-between max-w-6xl mx-auto gap-4">
      <button id="qrButton" type="button" class="p-2 opacity-80 hover:opacity-100 transition-opacity shrink-0" title="QR-коды и ссылки">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path>
        </svg>
      </button>

      <div class="text-center flex-1 min-w-0">
        <h1 id="pageTitle" class="text-lg sm:text-2xl font-bold text-white truncate">Чемпионат по промптингу</h1>
        <p id="clientName" class="text-sm text-white/80 truncate hidden"></p>
      </div>

      <button id="authButton" type="button" class="p-2 opacity-80 hover:opacity-100 transition-opacity shrink-0" title="Вход">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
        </svg>
      </button>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-8">

    <div id="logoWrap" class="flex justify-center pb-6 hidden">
      <img id="logo" src="" alt="" class="object-contain" style="height: 48px">
    </div>

    <!-- Заголовок дашборда -->
    <div class="flex items-center justify-between mb-4 gap-4">
      <h2 class="text-xl sm:text-2xl font-bold">
        Общий дашборд
        <span id="teamNameLabel" class="text-base font-normal hidden" data-theme="muted-text"></span>
      </h2>
      <button id="refreshButton" type="button" class="p-3 rounded-full hover:bg-gray-100 transition-colors shrink-0" title="Обновить">
        <svg id="refreshIcon" class="w-6 h-6" data-theme="accent-text" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
        </svg>
      </button>
    </div>

    <!-- Задания: страницы + точки внизу -->
    <div id="assignmentsSection" class="mb-6 sm:mb-8">
      <div id="assignmentsViewport" class="assignments-viewport w-full">
        <div id="assignmentsTrack" class="flex transition-transform duration-300 ease-out"></div>
      </div>
      <div id="assignmentsPager" class="hidden items-center justify-center gap-4 mt-4">
        <button id="pagerPrev" type="button" data-theme="card-bg rounded" class="pager-nav w-8 h-8 flex items-center justify-center shadow-sm border border-gray-200 hover:opacity-90 transition-opacity disabled:pointer-events-none disabled:opacity-40" aria-label="Предыдущая страница">
          <svg class="w-4 h-4 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
          </svg>
        </button>
        <div id="assignmentsDots" class="flex items-center gap-2"></div>
        <button id="pagerNext" type="button" data-theme="card-bg rounded" class="pager-nav w-8 h-8 flex items-center justify-center shadow-sm border border-gray-200 hover:opacity-90 transition-opacity disabled:pointer-events-none disabled:opacity-40" aria-label="Следующая страница">
          <svg class="w-4 h-4 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- Прогресс -->
    <section data-theme="card-bg rounded" class="p-6 sm:p-8 mb-6 sm:mb-8 shadow-sm border border-gray-200">
      <div>
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-base sm:text-lg font-semibold">Прогресс</h3>
          <span id="progressPercentage" class="text-sm font-medium" data-theme="muted-text">0%</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-3">
          <div id="progressBar" data-theme="accent-bg" class="h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
        </div>
        <div class="flex justify-between items-center text-xs mt-2 gap-4" data-theme="muted-text">
          <span id="progressSentLabel">0 команд</span>
          <span id="totalAssignments" class="font-medium shrink-0">0 из 0 заданий</span>
        </div>
      </div>
    </section>

    <!-- Рейтинг -->
    <section id="leaderboardSection" data-theme="card-bg rounded" class="p-6 sm:p-8 shadow-sm border border-gray-200">
      <h2 class="text-xl font-bold mb-6">Рейтинг команд</h2>
      <div id="leaderboard">
        <div class="text-center py-8" data-theme="muted-text">
          <p>Загрузка…</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Auth Modal -->
  <div id="authModal" class="fixed inset-0 bg-black/50 hidden z-50">
    <div class="flex items-center justify-center min-h-screen p-4">
      <div data-theme="card-bg rounded" class="shadow-xl max-w-md w-full p-6">
        <h3 class="text-xl font-bold mb-6">Вход в систему</h3>
        <div class="mb-6">
          <label class="block text-sm font-medium mb-2">Выберите роль:</label>
          <div class="space-y-2">
            <label class="flex items-center cursor-pointer">
              <input type="radio" name="role" value="captain" class="mr-2">
              <span>Капитан команды</span>
            </label>
            <label class="flex items-center cursor-pointer">
              <input type="radio" name="role" value="observer" class="mr-2">
              <span>Наблюдатель</span>
            </label>
          </div>
        </div>
        <div id="teamNameInput" class="mb-6 hidden">
          <label class="block text-sm font-medium mb-2">Название команды:</label>
          <input type="text" id="teamNameField" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Введите название команды">
        </div>
        <div class="flex gap-3">
          <button id="loginButton" type="button" data-theme="primary-bg rounded" class="flex-1 text-white py-2 px-4 font-medium hover:opacity-90 transition-opacity">Войти</button>
          <button id="cancelButton" type="button" class="flex-1 bg-gray-200 py-2 px-4 rounded-lg font-medium hover:bg-gray-300 transition-colors">Отмена</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Answer Modal -->
  <div id="answerModal" class="fixed inset-0 bg-black/50 hidden z-50">
    <div class="flex items-center justify-center min-h-screen p-4">
      <div data-theme="card-bg rounded" class="shadow-xl max-w-2xl w-full p-6 max-h-[90vh] overflow-y-auto">
        <h3 id="answerModalTitle" class="text-xl font-bold mb-2">Задание</h3>
        <p id="answerModalDescription" class="text-sm mb-4 whitespace-pre-wrap" data-theme="muted-text"></p>
        <div class="mb-4">
          <label class="block text-sm font-medium mb-2">Ваш промпт:</label>
          <textarea id="answerText" rows="8" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none" placeholder="Введите ваш промпт…"></textarea>
        </div>
        <div id="answerWarning" class="mb-4 p-3 bg-yellow-50 border border-yellow-200 rounded-lg">
          <p class="text-sm text-yellow-800">После отправки изменить промпт будет невозможно</p>
        </div>
        <div id="answerResultSection" class="hidden mb-4 border-t border-gray-200 pt-4">
          <div id="answerFeedbackWrap" class="hidden mb-4">
            <p class="text-sm font-semibold mb-2">Обратная связь</p>
            <div id="answerFeedbackDisplay" class="text-sm p-3 bg-gray-50 rounded-lg border border-gray-200 space-y-3" data-theme="muted-text"></div>
          </div>
          <div class="flex items-baseline justify-between gap-4">
            <span class="text-sm font-semibold">Оценка</span>
            <span id="answerScoreDisplay" class="inline-flex items-baseline gap-0.5 leading-none" data-theme="accent-text"></span>
          </div>
        </div>
        <div class="flex gap-3">
          <button id="submitAnswerButton" type="button" data-theme="primary-bg rounded" class="flex-1 text-white py-2 px-4 font-medium hover:opacity-90 transition-opacity">Отправить</button>
          <button id="cancelAnswerButton" type="button" class="flex-1 bg-gray-200 py-2 px-4 rounded-lg font-medium hover:bg-gray-300 transition-colors">Отмена</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Links / QR Modal -->
  <div id="linksModal" class="fixed inset-0 bg-black/50 hidden z-50">
    <div class="flex items-center justify-center min-h-screen p-2 sm:p-4">
      <div data-theme="card-bg rounded" class="w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden shadow-xl">
        <div class="flex items-center justify-between p-4 sm:p-6 border-b border-gray-200">
          <h3 class="text-lg sm:text-xl font-bold">ИИ-сервисы</h3>
          <button id="closeLinksModalTop" type="button" class="p-2 rounded-full hover:bg-gray-100 transition-colors shrink-0">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
        </div>
        <div id="linksModalContent" class="flex-1 overflow-y-auto p-4 sm:p-6"></div>
        <div class="p-4 sm:p-6 border-t border-gray-200 bg-gray-50">
          <button id="closeLinksModal" type="button" data-theme="primary-bg rounded" class="w-full text-white py-3 px-4 font-medium hover:opacity-90 transition-opacity">Закрыть</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.9.1/lib/qr-code-styling.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/colors.js"></script>
  <script src="js/qr.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
